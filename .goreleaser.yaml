version: 2

project_name: wireprompt

builds:
  - main: ./cmd/wireprompt
    env: [CGO_ENABLED=0]
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude: ["^chore", "^ci", "^docs"]

homebrew_casks:
  - # Skips publishing (binaries still release) when HOMEBREW_TAP_TOKEN is
    # empty. The token field's template engine lacks envOrDefault, so both
    # workflows must define the env var (empty is fine — upload skips).
    skip_upload: '{{ if envOrDefault "HOMEBREW_TAP_TOKEN" "" }}false{{ else }}true{{ end }}'
    repository:
      owner: zkrebbekx
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/zkrebbekx/wireprompt
    description: "See every prompt, token and dollar your AI tools spend — locally"
    license: MIT
