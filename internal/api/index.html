<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wireprompt</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #21262d; --text: #e6edf3;
    --dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --amber: #d29922; --red: #f85149;
    font-size: 14px;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font: 1rem/1.45 ui-sans-serif, system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: baseline; gap: 1.25rem; padding: .75rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--panel); }
  header h1 { font-size: 1.05rem; font-weight: 650; letter-spacing: .02em; }
  header h1 span { color: var(--accent); }
  .totals { display: flex; gap: 1.5rem; margin-left: auto; font-variant-numeric: tabular-nums; }
  .totals div { text-align: right; }
  .totals .v { font-size: 1.05rem; font-weight: 600; }
  .totals .l { color: var(--dim); font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; }
  main { flex: 1; display: flex; min-height: 0; }
  #list { flex: 1.1; overflow-y: auto; border-right: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  th, td { padding: .4rem .7rem; text-align: left; white-space: nowrap; }
  th { position: sticky; top: 0; background: var(--panel); color: var(--dim); font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; }
  tbody tr:hover { background: #1c2129; }
  tbody tr.sel { background: #1f2937; }
  td.num { text-align: right; }
  .model { color: var(--accent); }
  .cost { color: var(--green); font-weight: 600; }
  .status-ok { color: var(--green); } .status-err { color: var(--red); }
  #detail { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; }
  #detail .placeholder { color: var(--dim); margin-top: 3rem; text-align: center; }
  .meta { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: .6rem; margin-bottom: 1rem; }
  .meta div { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: .45rem .6rem; }
  .meta .l { color: var(--dim); font-size: .68rem; text-transform: uppercase; letter-spacing: .05em; }
  .meta .v { font-weight: 600; font-variant-numeric: tabular-nums; overflow: hidden; text-overflow: ellipsis; }
  .msg { border: 1px solid var(--border); border-radius: 8px; margin-bottom: .7rem; overflow: hidden; }
  .msg .role { padding: .3rem .7rem; font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; background: var(--panel); }
  .msg.user .role { color: var(--accent); }
  .msg.assistant .role { color: var(--green); }
  .msg.system .role { color: var(--amber); }
  .msg.tool .role { color: var(--dim); }
  .msg pre { padding: .6rem .8rem; white-space: pre-wrap; word-break: break-word; font: .85rem/1.5 ui-monospace, monospace; max-height: 24rem; overflow-y: auto; }
  h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: var(--dim); margin: 1.1rem 0 .5rem; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: .4rem; animation: pulse 2s infinite; }
  @keyframes pulse { 50% { opacity: .3; } }
</style>
</head>
<body>
<header>
  <h1><span>wire</span>prompt</h1>
  <div><span class="live-dot"></span><span style="color:var(--dim);font-size:.8rem">live</span></div>
  <div class="totals">
    <div><div class="v" id="t-reqs">0</div><div class="l">requests</div></div>
    <div><div class="v" id="t-in">0</div><div class="l">input tok</div></div>
    <div><div class="v" id="t-out">0</div><div class="l">output tok</div></div>
    <div><div class="v cost" id="t-cost">$0.00</div><div class="l">total cost</div></div>
  </div>
</header>
<main>
  <div id="list">
    <table>
      <thead><tr>
        <th>Time</th><th>Session</th><th>Model</th><th>St</th>
        <th class="num">In</th><th class="num">Out</th><th class="num">Cache</th>
        <th class="num">TTFT</th><th class="num">ms</th><th class="num">Cost</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div id="detail"><div class="placeholder">Select a request to inspect the conversation</div></div>
</main>
<script>
const rowsEl = document.getElementById('rows');
const fmt = n => n >= 1e6 ? (n/1e6).toFixed(2)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'k' : String(n);
const cost = c => '$' + (c >= 0.1 ? c.toFixed(2) : c.toFixed(4));
let totals = { reqs: 0, tin: 0, tout: 0, cost: 0 };
let selected = null;

function bumpTotals(r) {
  totals.reqs++; totals.tin += r.input_tokens + r.cache_read_tokens + r.cache_write_tokens;
  totals.tout += r.output_tokens; totals.cost += r.cost_usd;
  document.getElementById('t-reqs').textContent = fmt(totals.reqs);
  document.getElementById('t-in').textContent = fmt(totals.tin);
  document.getElementById('t-out').textContent = fmt(totals.tout);
  document.getElementById('t-cost').textContent = cost(totals.cost);
}

function addRow(r, prepend) {
  const tr = document.createElement('tr');
  tr.dataset.id = r.id;
  const t = new Date(r.started_at).toLocaleTimeString();
  const ok = r.status >= 200 && r.status < 300;
  tr.innerHTML = `<td>${t}</td><td>${esc(r.session)}</td><td class="model">${esc(r.model || '—')}</td>` +
    `<td class="${ok ? 'status-ok' : 'status-err'}">${r.status}</td>` +
    `<td class="num">${fmt(r.input_tokens)}</td><td class="num">${fmt(r.output_tokens)}</td>` +
    `<td class="num">${fmt(r.cache_read_tokens + r.cache_write_tokens)}</td>` +
    `<td class="num">${r.ttft_ms}</td><td class="num">${r.duration_ms}</td>` +
    `<td class="num cost">${cost(r.cost_usd)}</td>`;
  tr.onclick = () => select(r.id, tr);
  prepend ? rowsEl.prepend(tr) : rowsEl.append(tr);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

async function select(id, tr) {
  if (selected) selected.classList.remove('sel');
  selected = tr; tr.classList.add('sel');
  const r = await (await fetch('/api/requests/' + id)).json();
  renderDetail(r);
}

function renderDetail(r) {
  const d = document.getElementById('detail');
  d.innerHTML = '';
  const meta = document.createElement('div'); meta.className = 'meta';
  const pairs = [['model', r.model || '—'], ['session', r.session], ['status', r.status],
    ['input', fmt(r.input_tokens)], ['output', fmt(r.output_tokens)],
    ['cache read', fmt(r.cache_read_tokens)], ['cache write', fmt(r.cache_write_tokens)],
    ['ttft', r.ttft_ms + ' ms'], ['duration', r.duration_ms + ' ms'], ['cost', cost(r.cost_usd)]];
  for (const [l, v] of pairs) meta.innerHTML += `<div><div class="l">${l}</div><div class="v">${esc(String(v))}</div></div>`;
  d.append(meta);

  d.append(h3('Request'));
  renderConversation(d, r.request_body_text, r.provider);
  d.append(h3('Response'));
  renderResponse(d, r.response_body_text, r.provider);
}

function h3(t) { const h = document.createElement('h3'); h.textContent = t; return h; }

function block(parent, role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="role">${esc(role)}</div>`;
  const pre = document.createElement('pre'); pre.textContent = text;
  div.append(pre); parent.append(div);
}

function contentText(c) {
  if (typeof c === 'string') return c;
  if (Array.isArray(c)) return c.map(b => {
    if (b.type === 'text') return b.text;
    if (b.type === 'thinking') return '[thinking]\n' + (b.thinking || '');
    if (b.type === 'tool_use') return `[tool_use ${b.name}]\n` + JSON.stringify(b.input, null, 2);
    if (b.type === 'tool_result') return `[tool_result ${b.tool_use_id || ''}]\n` + contentText(b.content);
    if (b.type === 'image' || b.type === 'input_image') return '[image]';
    return JSON.stringify(b, null, 2);
  }).join('\n');
  return JSON.stringify(c, null, 2);
}

function renderConversation(parent, text, provider) {
  try {
    const req = JSON.parse(text);
    if (req.system) block(parent, 'system', contentText(req.system));
    for (const m of req.messages || req.input || []) {
      block(parent, m.role || 'user', contentText(m.content ?? m));
    }
    if (!req.messages && !req.input) block(parent, 'user', JSON.stringify(req, null, 2));
  } catch { block(parent, 'user', text || '(empty)'); }
}

function renderResponse(parent, text, provider) {
  if (!text) { block(parent, 'assistant', '(empty)'); return; }
  if (text.startsWith('event:') || text.startsWith('data:')) {
    block(parent, 'assistant', reassembleSSE(text, provider)); return;
  }
  try {
    const resp = JSON.parse(text);
    if (resp.content) { block(parent, 'assistant', contentText(resp.content)); return; }
    if (resp.choices) { block(parent, 'assistant', resp.choices.map(c => contentText(c.message?.content ?? c.delta?.content ?? '')).join('\n')); return; }
    block(parent, 'assistant', JSON.stringify(resp, null, 2));
  } catch { block(parent, 'assistant', text); }
}

function reassembleSSE(text, provider) {
  let out = '';
  for (const line of text.split('\n')) {
    if (!line.startsWith('data:')) continue;
    const payload = line.slice(5).trim();
    if (payload === '[DONE]') continue;
    try {
      const ev = JSON.parse(payload);
      if (ev.type === 'content_block_delta') {
        if (ev.delta?.type === 'text_delta') out += ev.delta.text;
        if (ev.delta?.type === 'thinking_delta') out += ev.delta.thinking;
        if (ev.delta?.type === 'input_json_delta') out += ev.delta.partial_json;
      } else if (ev.type === 'content_block_start' && ev.content_block?.type === 'tool_use') {
        out += `\n[tool_use ${ev.content_block.name}] `;
      } else if (ev.choices) {
        out += ev.choices[0]?.delta?.content ?? '';
      }
    } catch {}
  }
  return out || '(stream with no text content)';
}

async function boot() {
  const recs = await (await fetch('/api/requests?limit=200')).json();
  for (const r of recs) { addRow(r, false); bumpTotals(r); }
  const es = new EventSource('/api/live');
  es.onmessage = e => { const r = JSON.parse(e.data); addRow(r, true); bumpTotals(r); };
}
boot();
</script>
</body>
</html>
